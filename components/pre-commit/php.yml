# pre-commit hooks — PHP (Pint + PHPStan)
#
# Uses the pre-commit.com framework. Install with:
#   pip install pre-commit
#   pre-commit install
#
# Requires vendor/ to be present (run `composer install` first).
#
# Template variables to substitute before use (see stacks/ README for values):
#   ${PHPSTAN_LEVEL}   analysis level, e.g. "5" (0=loose … 9=strict)

repos:
  - repo: local
    hooks:
      - id: pint
        name: pint (PHP)
        entry: vendor/bin/pint
        language: system
        pass_filenames: true
        files: \.php$

      - id: phpstan
        name: phpstan (PHP)
        entry: vendor/bin/phpstan analyse --level=${PHPSTAN_LEVEL} --no-progress
        language: system
        pass_filenames: false
        files: \.php$
