# Build & Deploy
#
# Builds backend and frontend Docker images, pushes them to GHCR, then
# deploys to the VPS over SSH by fetching the exact compose file for the
# deployed commit.
#
# Required secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY
#
# Template variables to substitute before use (see stacks/ README for values):
#   ${CI_WORKFLOW_NAME}         name of the CI workflow that gates this CD
#                               e.g. "CI" — change to "E2E" if E2E is the gate
#   ${GHCR_OWNER}               GitHub username lowercase, e.g. "marvinlerouge"
#   ${PROJECT_NAME}             kebab-case project name, e.g. "hivemind"
#   ${BACKEND_BUILD_CONTEXT}    Docker build context for backend, e.g. "."
#   ${BACKEND_DOCKERFILE}       path to backend Dockerfile, e.g. "apps/api/Dockerfile"
#   ${FRONTEND_BUILD_CONTEXT}   Docker build context for frontend, e.g. "."
#   ${FRONTEND_DOCKERFILE}      path to frontend Dockerfile, e.g. "apps/web/Dockerfile"
#   ${DEPLOY_PATH}              absolute path on VPS, e.g. "/opt/hivemind"
#   ${COMPOSE_FILE}             compose file path in repo, e.g. "docker-compose.prod.yml"

name: Build & Deploy

on:
  workflow_run:
    workflows: ["${CI_WORKFLOW_NAME}"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      head_sha: ${{ steps.meta.outputs.sha }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve commit SHA
        id: meta
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "tag=sha-${SHA::7}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ${BACKEND_BUILD_CONTEXT}
          file: ${BACKEND_DOCKERFILE}
          # target: production   # uncomment if your Dockerfile uses multi-stage builds
          push: true
          tags: |
            ghcr.io/${GHCR_OWNER}/${PROJECT_NAME}/backend:${{ steps.meta.outputs.tag }}
            ghcr.io/${GHCR_OWNER}/${PROJECT_NAME}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ${FRONTEND_BUILD_CONTEXT}
          file: ${FRONTEND_DOCKERFILE}
          # target: production   # uncomment if your Dockerfile uses multi-stage builds
          push: true
          tags: |
            ghcr.io/${GHCR_OWNER}/${PROJECT_NAME}/frontend:${{ steps.meta.outputs.tag }}
            ghcr.io/${GHCR_OWNER}/${PROJECT_NAME}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GITHUB_SHA: ${{ needs.build-and-push.outputs.head_sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOY_PATH: ${DEPLOY_PATH}
          COMPOSE_FILE: ${COMPOSE_FILE}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_TAG,GITHUB_SHA,GITHUB_REPOSITORY,DEPLOY_PATH,COMPOSE_FILE
          script_stop: true
          script: |
            set -Eeuo pipefail

            echo "==> Authenticate to GHCR"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            echo "==> Fetch compose file (commit: ${GITHUB_SHA})"
            curl -fsSL \
              "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/${COMPOSE_FILE}" \
              -o "${DEPLOY_PATH}/docker-compose.prod.yml"

            cd "${DEPLOY_PATH}"

            echo "==> Pull images (tag: ${IMAGE_TAG})"
            IMAGE_TAG="${IMAGE_TAG}" docker compose -f docker-compose.prod.yml pull

            echo "==> Redeploy stack"
            IMAGE_TAG="${IMAGE_TAG}" docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Run pending migrations — uncomment and adapt for your stack:
            # docker compose -f docker-compose.prod.yml exec -T backend \
            #   sh -c "${MIGRATIONS_CMD}"
            #
            # Stack examples:
            #   FastAPI + Alembic : alembic upgrade head
            #   Fastify + Prisma  : npx prisma migrate deploy
            #   Laravel           : php artisan migrate --force

            echo "==> Stack status"
            docker compose -f docker-compose.prod.yml ps
